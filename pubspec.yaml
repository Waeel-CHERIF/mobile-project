name: audio_player_app
description: A secure audio player application with Firebase Auth and biometric authentication.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State Management
  provider: ^6.1.2

  # Audio
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.13
  audio_service: ^0.18.15

  # Biometric
  local_auth: ^2.3.0

  # Storage & Preferences
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  http: ^1.2.2
  uuid: ^4.5.1
  path_provider: ^2.1.4
  rxdart: ^0.28.0

  # Navigation
  go_router: ^14.3.0

  # Date
  date_picker_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
